name: Download GOES Event Windows

on:
  workflow_dispatch:

jobs:
  run-goes-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GOES downloader
        run: |
          python src/download_goes_windows.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: goes-event-output
          path: data/output/
