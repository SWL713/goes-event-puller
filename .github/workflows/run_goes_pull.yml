name: Historical GOES Review Batch

on:
  workflow_dispatch:

jobs:
  run-review-batch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull historical GOES windows
        run: |
          python src/download_goes_windows.py

      - name: Run frozen baseline picker on windows
        run: |
          python src/run_picker_on_windows.py

      - name: Show output tree
        if: always()
        run: |
          echo "=== output tree ==="
          ls -R data/output || true

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: historical-goes-review-output
          path: data/output/**
          if-no-files-found: warn
